# ============================================================
# AETHERIS OMNIVERSE — Kubernetes Manifests
# Covers: Namespace, HPA, PodDisruptionBudget, Istio config
# ============================================================

---
# ── Namespace ──────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: aetheris-prod
  labels:
    istio-injection: enabled
    app.kubernetes.io/name: aetheris-omniverse

---
# ── Game State Service Deployment ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-state-service
  namespace: aetheris-prod
  labels:
    app:     game-state-service
    version: v1
spec:
  replicas: 10
  selector:
    matchLabels:
      app: game-state-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       2
      maxUnavailable: 0    # Zero-downtime: never kill a pod until new ones are healthy
  template:
    metadata:
      labels:
        app:     game-state-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9090"
        prometheus.io/path:   "/metrics"
    spec:
      terminationGracePeriodSeconds: 60  # Drain active game sessions
      topologySpreadConstraints:
        - maxSkew:            1
          topologyKey:        kubernetes.io/hostname
          whenUnsatisfiable:  DoNotSchedule
          labelSelector:
            matchLabels:
              app: game-state-service
        - maxSkew:            1
          topologyKey:        topology.kubernetes.io/zone
          whenUnsatisfiable:  DoNotSchedule
          labelSelector:
            matchLabels:
              app: game-state-service
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [game-state-service]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: game-state-service
          image: ghcr.io/aetheris/game-state-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aetheris-secrets
                  key:  database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aetheris-secrets
                  key:  redis-url
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu:    "500m"
              memory: "512Mi"
            limits:
              cpu:    "2000m"
              memory: "2Gi"
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds:       5
            failureThreshold:    3
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds:       15
            failureThreshold:    3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]  # Drain in-flight requests

---
# ── HPA — Game State (scale 10→200 pods) ──────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: game-state-service-hpa
  namespace: aetheris-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       game-state-service
  minReplicas: 10
  maxReplicas: 200
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 75
    - type: Pods
      pods:
        metric:
          name: grpc_server_handling_seconds_count  # custom Prometheus metric
        target:
          type:         AverageValue
          averageValue: "1000"  # 1000 active gRPC streams per pod
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # Fast scale-up for traffic spikes
      policies:
        - type:          Pods
          value:         20
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # Slow scale-down to prevent flapping
      policies:
        - type:          Pods
          value:         5
          periodSeconds: 60

---
# ── PodDisruptionBudget ────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: game-state-service-pdb
  namespace: aetheris-prod
spec:
  minAvailable: "70%"
  selector:
    matchLabels:
      app: game-state-service

---
# ── WebSocket Service (Gateway) ────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: aetheris-prod
spec:
  replicas: 20
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/aetheris/gateway:latest
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 3001
              name: websocket
          env:
            - name: REDIS_ADAPTER_URL
              valueFrom:
                secretKeyRef:
                  name: aetheris-secrets
                  key:  redis-adapter-url
            - name: MAX_WS_CONNECTIONS
              value: "50000"   # 50K WebSocket connections per pod
            - name: WS_HEARTBEAT_INTERVAL
              value: "25000"
          resources:
            requests:
              cpu:    "1000m"
              memory: "1Gi"
            limits:
              cpu:    "4000m"
              memory: "4Gi"

---
# ── HPA Gateway (20→400 pods for 10M users) ───────────────
# 10M users × 100ms avg message = 1M msg/s
# 50K conn/pod × 400 pods = 20M conn capacity (2× headroom)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: aetheris-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       gateway
  minReplicas: 20
  maxReplicas: 400
  metrics:
    - type: Pods
      pods:
        metric:
          name: websocket_connections_active
        target:
          type:         AverageValue
          averageValue: "40000"  # scale up at 40K (below 50K limit)

---
# ── Istio VirtualService — Traffic splitting ──────────────
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: aetheris-vs
  namespace: aetheris-prod
spec:
  hosts:
    - "play.aetheris.gg"
    - "gateway.aetheris-prod.svc.cluster.local"
  gateways:
    - aetheris-gateway
    - mesh
  http:
    - match:
        - uri:
            prefix: "/ws"
      route:
        - destination:
            host: gateway
            port:
              number: 3001
          weight: 95    # stable
        - destination:
            host: gateway-canary
            port:
              number: 3001
          weight: 5     # canary
    - route:
        - destination:
            host: gateway
            port:
              number: 3000
          weight: 95
        - destination:
            host: gateway-canary
            port:
              number: 3000
          weight: 5
      retries:
        attempts:       3
        perTryTimeout:  2s
        retryOn:        "gateway-error,connect-failure,retriable-4xx"
      timeout: 10s

---
# ── Istio DestinationRule — Circuit breaker ───────────────
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: game-state-service-dr
  namespace: aetheris-prod
spec:
  host: game-state-service
  trafficPolicy:
    connectionPool:
      grpc:
        h2UpgradePolicy:  UPGRADE
      tcp:
        maxConnections:    1000
        connectTimeout:    30ms
    outlierDetection:
      consecutive5xxErrors:   5
      interval:               10s
      baseEjectionTime:       30s
      maxEjectionPercent:     50
      minHealthPercent:       50
    loadBalancer:
      simple: LEAST_CONN    # For game state: least connections wins
  subsets:
    - name:   stable
      labels: { version: v1 }
    - name:   canary
      labels: { version: v2 }

---
# ── PeerAuthentication — mTLS everywhere ──────────────────
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: aetheris-prod
spec:
  mtls:
    mode: STRICT

---
# ── AuthorizationPolicy — Zero-trust ─────────────────────
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: game-state-authz
  namespace: aetheris-prod
spec:
  selector:
    matchLabels:
      app: game-state-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/aetheris-prod/sa/gateway"
              - "cluster.local/ns/aetheris-prod/sa/matchmaking-service"
      to:
        - operation:
            methods: ["POST"]
            paths:   ["/aetheris.GameState/*"]

---
# ── Redis Cluster (session + ws adapter) ─────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: aetheris-prod
spec:
  serviceName: redis-cluster
  replicas: 6   # 3 master + 3 replica
  selector:
    matchLabels:
      app: redis-cluster
  template:
    metadata:
      labels:
        app: redis-cluster
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            - redis-server
            - /etc/redis/redis.conf
            - --cluster-enabled yes
            - --cluster-config-file /data/nodes.conf
            - --cluster-node-timeout 5000
            - --appendonly yes
            - --save 900 1
            - --save 300 10
          resources:
            requests:
              cpu:    "500m"
              memory: "4Gi"
            limits:
              cpu:    "2000m"
              memory: "8Gi"
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 50Gi
        storageClassName: gp3-encrypted

---
# ── ConfigMap: Scaling Reference ──────────────────────────
# AETHERIS 10M CCU CAPACITY PLAN
#
# Layer               | Pods  | Conn/Pod | Total Capacity    | Headroom
# ──────────────────────────────────────────────────────────────────────
# Gateway (WS)        |  400  |  50,000  |  20,000,000       |  2×
# Game State (gRPC)   |  200  |  50,000  |  10,000,000       |  1×
# Matchmaking         |   50  |    N/A   |  100,000 matches/m|  2×
# Auth Service        |   30  |    N/A   |  200,000 req/s    |  3×
# Economy Service     |   20  |    N/A   |  50,000 tx/s      |  2×
# Anti-Cheat AI       |   40  | GPU pods |  2,000,000 ev/s   |  2×
# ──────────────────────────────────────────────────────────────────────
# Redis Cluster       | 6 pods| 500K ops/s (cluster aggregate)
# PostgreSQL (Citus)  | 12 shards | 500K TPS (PgBouncer pooled)
# CDN (CloudFront)    | Global | 99% cache hit rate, <50ms TTFB
apiVersion: v1
kind: ConfigMap
metadata:
  name: scaling-reference
  namespace: aetheris-prod
data:
  notes: |
    See above table. All HPA min replicas provide baseline for 1M CCU.
    Burst capacity (10M) requires all HPAs to reach their max.
    Pre-warming procedure: trigger scale-up 30min before planned events.
